data_dir: ../../../brats_seg_project/brats_seg_project/training_data1_v2
processed_dir: processed
checkpoint_dir: checkpoints
output_dir: outputs
log_dir: logs

image_size: 128
modalities: [t1n, t1c, t2w, t2f]

batch_size: 8
learning_rate: 2.5e-5
num_epochs: 100
save_every_steps: 100
eval_every_steps: 500
num_workers: 4
gradient_accumulation_steps: 4
cache_in_memory: false
max_train_patients: 500   # set e.g. 100 to use only 100 patients

lambda_tgap: 0.0
num_diffusion_steps: 1000
beta_schedule: linear
beta_start: 1.0e-4
beta_end: 0.02

unet_base_channels: 64
unet_channel_mults: [1, 2, 4, 8]
unet_attn_resolutions: [16]
unet_dropout: 0.1
tsa_out_channels: 256

device: cuda
mixed_precision: False
gradient_clip: 1.0
compile_model: false

seed: 42
resume: null
