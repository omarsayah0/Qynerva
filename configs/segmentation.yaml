seed: 42
project_name: brats_3d_unet

data:
  root_dir: "./training_data"   # <-- set this to your BraTS folder
  num_workers: 4
  val_ratio: 0.15
  test_ratio: 0.15
  cache_rate: 0.0
  patch_size: [128, 128, 128]
  samples_per_volume: 2
  batch_size: 1

model:
  in_channels: 4
  out_channels: 4
  channels: [32, 64, 128, 256, 320]
  strides: [2, 2, 2, 2]
  num_res_units: 2
  dropout: 0.0

training:
  epochs: 80
  lr: 0.0001
  weight_decay: 0.00001
  amp: true
  device: "cuda"
  save_dir: "./outputs/segmentation"
  checkpoint_name: "best_model.pt"

loss:
  dice_weight: 0.7
  tversky_weight: 0.3
  alpha: 0.7
  beta: 0.3
